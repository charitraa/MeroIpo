name: ipo
description: "Nepal IPO Auto-Apply App — automatically applies for MeroShare IPOs across multiple accounts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Storage
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # Background + push
  workmanager: ^0.5.2
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0

  # Auth
  local_auth: ^2.1.7

  # Functional / models
  dartz: ^0.10.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.3.3
  logger: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
